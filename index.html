<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Клининг сервис</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px;
      background: #f5f5f5;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
    }
    input, button {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      font-size: 16px;
    }
    button {
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }
    a.call {
      display: block;
      margin-top: 10px;
      color: blue;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>Уборка квартир и домов</h1>
  <p>Оставьте заявку — перезвоним за 5 минут</p>

<form action="https://formspree.io/f/mvzdrdba" method="POST">
  <input type="text" name="name" placeholder="Ваше имя" required>
  <input type="tel" name="phone" placeholder="Телефон" required>
  <button type="submit">Оставить заявку</button>
</form>

  <a class="call" href="tel:+380XXXXXXXXX">📞 Позвонить сейчас</a>
</div>

</body>
</html>
